version: '3.8'

services:
  miner_server:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uvicorn", "miner_server:app", "--host", "0.0.0.0", "--port", "5000"]
    ports:
      - "5000:5000"

  validator_server:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uvicorn", "validator_server:app", "--host", "0.0.0.0", "--port", "5001"]
    ports:
      - "5001:5001"

  miner:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "neurons/miner.py", "--netuid", "1", "wallet.name", "miner", "wallet.hotkey"] # TODO netuid

  validator:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "script2.py"]
